services:
  app:
    image: timmyamant/marquee:latest
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marquee}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env, see .env.local.example}"
      POSTGRES_DB: ${POSTGRES_DB:-marquee}
      AUTH_SECRET: "${AUTH_SECRET:?Set AUTH_SECRET in .env, generate with openssl rand -base64 32}"
      # Self-hosted apps are usually reached via a LAN IP or local hostname
      # that isn't known ahead of time, so trust whatever host the request
      # arrives on rather than requiring a fixed AUTH_URL.
      AUTH_TRUST_HOST: "true"
      MASTER_ENCRYPTION_KEY: "${MASTER_ENCRYPTION_KEY:?Set MASTER_ENCRYPTION_KEY in .env, generate with openssl rand -base64 32}"
      TMDB_ACCESS_TOKEN: ${TMDB_ACCESS_TOKEN}
      TMDB_API_KEY: ${TMDB_API_KEY}
      TVDB_API_KEY: ${TVDB_API_KEY}
      TVDB_PIN: ${TVDB_PIN}
    volumes:
      - marquee_postgres_data:/var/lib/postgresql/data

volumes:
  marquee_postgres_data:
